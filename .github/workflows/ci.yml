# CI workflow for ASTN
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    env:
      # SvelteKit $env/static/public requires these at build time.
      # CI only validates the build compiles — values don't need to be real.
      PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
      PUBLIC_CONVEX_SITE_URL: https://placeholder.convex.site
      PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
      PUBLIC_POSTHOG_KEY: phc_placeholder
      PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - uses: actions/checkout@v4

      - name: Cache Vite+
        id: cache-viteplus
        uses: actions/cache@v4
        with:
          path: ~/.vite-plus
          key: viteplus-0.1.12

      - name: Setup Vite+
        if: steps.cache-viteplus.outputs.cache-hit != 'true'
        run: curl -fsSL https://vite.plus | bash

      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> $GITHUB_PATH

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Lint
        run: vp lint && bun run lint:convex

      - name: Build
        run: vp build

      - name: Test
        run: |
          TEST_FILES=$(find src convex -name "*.test.ts" -o -name "*.spec.ts" 2>/dev/null || true)
          if [ -n "$TEST_FILES" ]; then
            vp test
          else
            echo "No test files found in src/ or convex/, skipping tests"
          fi
